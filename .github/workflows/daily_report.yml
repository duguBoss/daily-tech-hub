name: Daily AI News Update

on:
  schedule:
    # Beijing time 20:00 = UTC 12:00
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests
          fi

      - name: Run AI News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: python daily_news_scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          mkdir -p data
          mkdir -p assets/news_images
          touch data/daily_ai_news.json

          git add data/daily_ai_news.json
          git add assets/news_images

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Daily AI News: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
