name: Daily AI News Update

on:
  schedule:
    # 北京时间 20:00 是 UTC 时间 12:00
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动点击按钮触发执行

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Action 推送代码到仓库的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_ai_news.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/daily_ai_news.json
          # 如果文件没有变化（内容一致），git commit 会报错，使用 || exit 0 忽略
          git commit -m "Update Daily AI News: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
