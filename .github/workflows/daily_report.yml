name: Daily AI News Update

on:
  schedule:
    # 北京时间 20:00 是 UTC 时间 12:00
    - cron: '0 12 * * *'
  workflow_dispatch: # 允许手动点击按钮触发执行

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予 Action 推送代码到仓库的权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_ai_news.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 确保文件夹存在，即使脚本没生成文件，git add 也不会报 pathspec 错误
          mkdir -p data
          touch data/daily_ai_news.json 
          
          git add data/daily_ai_news.json
          
          # 只有在有内容变化时才 commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Daily AI News: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
